apiVersion: v1
kind: ConfigMap
metadata:
  name: munientry-config
  namespace: munientry
  labels:
    app.kubernetes.io/name: munientry
data:
  # ASP.NET Core runtime environment
  ASPNETCORE_ENVIRONMENT: "Development"
  # ApiBaseUrl consumed by the Blazor WASM client (resolved in the browser, so use the public
  # ingress hostname + versioned path prefix).  Must match the MapGroup("/api/v1") prefix in
  # api/Program.cs and the ApiBaseUrl key in client/wwwroot/appsettings.json.
  API_BASE_URL: "http://munientry.local/api/v1/"
