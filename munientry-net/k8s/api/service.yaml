apiVersion: v1
kind: Service
metadata:
  name: munientry-api
  namespace: munientry
  labels:
    app.kubernetes.io/name: munientry-api
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app: munientry-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
