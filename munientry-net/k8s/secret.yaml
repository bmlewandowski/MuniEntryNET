# ---------------------------------------------------------------
# SECRET TEMPLATE — do NOT commit real values to source control.
# Copy this file, fill in actual values, and apply with:
#   kubectl apply -f secret.yaml -n munientry
#
# Values in stringData are stored as opaque Secrets by Kubernetes
# (base64-encoded automatically at admission time).
# ---------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: munientry-secrets
  namespace: munientry
  labels:
    app.kubernetes.io/name: munientry
type: Opaque
stringData:
  # Microsoft Entra ID (Azure AD) — used by the API for authentication
  ENTRA_CLIENT_ID: "REPLACE_ME"
  ENTRA_TENANT_ID: "REPLACE_ME"
  ENTRA_CLIENT_SECRET: "REPLACE_ME"

  # SQL Server connection string
  # Windows Auth is not supported in Linux containers — use a SQL login.
  # host.docker.internal resolves to the host machine; for K8s use the actual
  # hostname or IP of your SQL Server, or a Kubernetes Service name.
  AUTHORITY_COURT_CONNSTR: "Server=REPLACE_ME;Database=AuthorityCourt;User Id=REPLACE_ME;Password=REPLACE_ME;TrustServerCertificate=True;"
