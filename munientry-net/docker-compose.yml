services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID:-}
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID:-}
      - ENTRA_CLIENT_SECRET=${ENTRA_CLIENT_SECRET:-}
      # Windows Auth is not supported in Linux containers.
      # Create a .env file in this directory and set AUTHORITY_COURT_CONNSTR to a SQL login
      # connection string. host.docker.internal resolves to the host machine from inside Docker.
      # Example .env entry:
      #   AUTHORITY_COURT_CONNSTR=Server=host.docker.internal;Database=AuthorityCourt;User Id=munientry_app;Password=CHANGE_ME;TrustServerCertificate=True;
      - ConnectionStrings__AuthorityCourt=${AUTHORITY_COURT_CONNSTR:-}
  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - api
