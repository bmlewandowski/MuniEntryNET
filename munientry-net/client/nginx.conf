server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve index.html for any path that isn't a real file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Blazor framework assets — must be served exactly as-is, no fallback to index.html
    location /_framework/ {
        try_files $uri =404;
    }

    location /_content/ {
        try_files $uri =404;
    }
}
