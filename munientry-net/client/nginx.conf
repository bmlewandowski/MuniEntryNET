server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve index.html for any path that isn't a real file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Blazor framework assets — must be served exactly as-is, no fallback to index.html
    location /_framework/ {
        try_files $uri =404;
    }

    location /_content/ {
        try_files $uri =404;
    }

    # Forward API calls from the browser to the API container.
    # The Blazor WASM app runs in the browser and cannot resolve Docker-internal
    # hostnames (e.g. "http://api"). Proxying through nginx at the same origin
    # avoids cross-origin issues and works in both Docker Compose and K8s ingress.
    location /api/ {
        proxy_pass         http://api/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
