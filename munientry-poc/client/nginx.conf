server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: if a file isn't found, serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve _framework and static assets normally
    location /_framework/ {
        try_files $uri $uri/ =404;
    }

    location /_content/ {
        try_files $uri $uri/ =404;
    }
}
